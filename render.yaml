# Render Deployment Configuration
# This file tells Render how to deploy both backend and frontend

services:
  # ─── Backend: FastAPI + Socket.io (Python) ─────────────────────────────────
  - type: web
    name: swifttor-api
    runtime: python
    rootDir: swifttor/apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    plan: starter
    branch: main
    autoDeploy: true
    envVars:
      # Database connections
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Authentication
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      # AI & Payments
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      # Storage
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET_NAME
        value: swifttor-emergency-uploads
      # Communications
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Monitoring
      - key: SENTRY_DSN
        sync: false
      # CORS - Add your Vercel URL here after deployment
      - key: CORS_ORIGINS
        sync: false

  # ─── Frontend: Next.js (Node.js) ───────────────────────────────────────────
