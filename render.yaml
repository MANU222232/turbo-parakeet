services:
  # ─── Backend: FastAPI + Socket.io ──────────────────────────────────────────
  - type: web
    name: swifttor-api
    runtime: python
    rootDir: swifttor/apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      # ── Database ───────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard — Neon PostgreSQL connection string
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard — MongoDB Atlas connection string
      - key: UPSTASH_REDIS_REST_URL
        sync: false   # Set in Render dashboard
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false   # Set in Render dashboard
      # ── Authentication & Security ──────────────────────────────────────────
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      # ── AI ─────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      # ── Payments ───────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      # ── Storage ────────────────────────────────────────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET_NAME
        value: swifttor-emergency-uploads
      # ── Communications ─────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # ── Monitoring ─────────────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      # ── CORS (comma-separated list of allowed frontend origins) ────────────
      - key: CORS_ORIGINS
        sync: false   # e.g. https://swifttor-web.onrender.com,https://yourdomain.com

  # ─── Frontend: Next.js ─────────────────────────────────────────────────────
  - type: web
    name: swifttor-web
    runtime: node
    rootDir: swifttor/apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # ── API URL — set to your deployed API service URL ─────────────────────
      - key: NEXT_PUBLIC_API_URL
        sync: false   # e.g. https://swifttor-api.onrender.com
      # ── NextAuth ───────────────────────────────────────────────────────────
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false   # e.g. https://swifttor-web.onrender.com
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false   # e.g. https://swifttor-web.onrender.com
      # ── Google Maps ────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_GOOGLE_MAPS_KEY
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
      # ── Payments ───────────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_PAYPAL_CLIENT_ID
        sync: false
      # ── Monitoring ─────────────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      # ── Node environment ───────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
